<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Background gradient -->
  <defs>
    <radialGradient id="gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4C02E0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Main Title -->
  <text x="600" y="200" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold">
    EQUANTRA
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="280" text-anchor="middle" fill="#E5E5E5" font-family="Arial, sans-serif" font-size="32" font-weight="400">
    Emerging Web Development Agency in India
  </text>
  
  <!-- Services -->
  <text x="600" y="340" text-anchor="middle" fill="#B0B0B0" font-family="Arial, sans-serif" font-size="24">
    Mobile Apps • Web Development • Desktop Apps
  </text>
  
  <!-- Call to Action -->
  <rect x="450" y="420" width="300" height="60" rx="30" fill="white"/>
  <text x="600" y="460" text-anchor="middle" fill="black" font-family="Arial, sans-serif" font-size="24" font-weight="600">
    Get Custom Solutions →
  </text>
  
  <!-- Bottom tagline -->
  <text x="600" y="550" text-anchor="middle" fill="#808080" font-family="Arial, sans-serif" font-size="18">
    Serving clients across India and overseas
  </text>
</svg>
